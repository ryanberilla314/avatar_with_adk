<!DOCTYPE html>
<html lang="en">


<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gemini Live Avatar Client</title>
  <meta name="description" content="A glassmorphic real-time Gemini Live Avatar streaming client built for ADK.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --primary: #00b0ff;
      /* Electric blue accent */
      --primary-hover: #40c4ff;
      --bg: #030712;
      --card-bg: rgba(10, 15, 30, 0.45);
      --card-border: rgba(255, 255, 255, 0.08);
      --text: #f3f4f6;
      --text-muted: #9ca3af;
      --gold: #FFB800;
      /* Premium gold accent */
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      width: 100vw;
      height: 100vh;
      margin: 0;
      padding: 0;
      overflow: hidden;
      display: flex;
      position: relative;
    }

    /* Video wrapper occupies the full screen, centered */
    .avatar-wrapper {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .avatar-video {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .avatar-placeholder {
      position: absolute;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      transition: opacity 0.5s ease;
    }

    .avatar-placeholder.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .avatar-placeholder p {
      font-size: 1.1rem;
      font-weight: 500;
      margin-top: 16px;
      letter-spacing: 0.5px;
    }

    /* Left Sidebar Overlay Panel */
    .overlay-panel {
      position: absolute;
      top: 40px;
      left: 40px;
      bottom: 120px;
      /* Leave space for bottom bar and margin */
      width: 440px;
      z-index: 10;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border-radius: 28px;
      padding: 32px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .brand-row {
      display: flex;
      align-items: baseline;
      gap: 4px;
    }

    .citi-logo {
      font-size: 2.2rem;
      font-weight: 800;
      color: #004B87;
      /* Citi Blue */
      font-family: Arial, sans-serif;
      letter-spacing: -1.5px;
      text-transform: lowercase;
      background: linear-gradient(135deg, #00b0ff 0%, #004B87 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .brand-sub {
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--text);
      opacity: 0.95;
    }

    .status-badge {
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 6px 14px;
      border-radius: 100px;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--primary);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ea4335;
      box-shadow: 0 0 8px #ea4335;
      transition: background 0.3s, box-shadow 0.3s;
    }

    .status-dot.connected {
      background: #34c759;
      box-shadow: 0 0 10px #34c759;
    }

    .welcome-text {
      margin-bottom: 20px;
    }

    .welcome-text h2 {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .welcome-text p {
      font-size: 0.85rem;
      color: var(--text-muted);
      line-height: 1.4;
    }

    /* Chat Log */
    .chat-box {
      flex-grow: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding-right: 8px;
      margin-bottom: 8px;
      mask-image: linear-gradient(to bottom, transparent 0%, black 5%, black 95%, transparent 100%);
      -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 5%, black 95%, transparent 100%);
    }

    /* Scrollbar */
    .chat-box::-webkit-scrollbar {
      width: 4px;
    }

    .chat-box::-webkit-scrollbar-track {
      background: transparent;
    }

    .chat-box::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
    }

    .chat-message {
      padding: 12px 16px;
      border-radius: 18px;
      max-width: 88%;
      line-height: 1.45;
      font-size: 0.95rem;
      animation: messageSlide 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes messageSlide {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .chat-message.user {
      background: linear-gradient(135deg, #00b0ff 0%, #004B87 100%);
      color: #fff;
      align-self: flex-end;
      font-weight: 500;
      border-bottom-right-radius: 4px;
      box-shadow: 0 4px 12px rgba(0, 176, 255, 0.2);
    }

    .chat-message.model {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.04);
      color: var(--text);
      align-self: flex-start;
      border-top-left-radius: 4px;
    }

    /* Floating Bottom Input Bar */
    .input-bar-container {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 80px);
      max-width: 680px;
      z-index: 10;
      background: rgba(15, 20, 35, 0.65);
      border: 1px solid rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border-radius: 24px;
      padding: 12px 18px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
      transition: all 0.3s ease;
    }

    .input-bar-container:focus-within {
      border-color: var(--primary);
      box-shadow: 0 20px 50px rgba(0, 176, 255, 0.15);
    }

    .text-input {
      flex-grow: 1;
      background: transparent;
      border: none;
      color: var(--text);
      font-family: inherit;
      font-size: 1.05rem;
      outline: none;
      padding: 8px 0;
    }

    .text-input::placeholder {
      color: var(--text-muted);
      opacity: 0.8;
    }

    .btn {
      background: var(--primary);
      color: #030712;
      border: none;
      border-radius: 16px;
      padding: 10px 24px;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 12px rgba(0, 176, 255, 0.3);
    }

    .btn:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(1px);
    }

    .btn-mic {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--text);
      width: 48px;
      height: 48px;
      border-radius: 16px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-mic:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .btn-mic.recording {
      background: #ea4335;
      border-color: #ea4335;
      color: #fff;
      box-shadow: 0 0 15px rgba(234, 67, 53, 0.4);
    }

    .btn-mic svg {
      width: 22px;
      height: 22px;
    }

    .wave {
      width: 50px;
      height: 50px;
      background: rgba(0, 176, 255, 0.15);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% {
        box-shadow: 0 0 0 0 rgba(0, 176, 255, 0.4);
      }

      70% {
        box-shadow: 0 0 0 16px rgba(0, 176, 255, 0);
      }

      100% {
        box-shadow: 0 0 0 0 rgba(0, 176, 255, 0);
      }
    }

    /* Widget Overlay Container */
    .widget-overlay-container {
      position: absolute;
      bottom: 120px;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 80px);
      max-width: 460px;
      z-index: 9;
      display: flex;
      flex-direction: column;
      gap: 16px;
      pointer-events: none;
      /* Let clicks pass through if empty */
    }

    .widget-card {
      pointer-events: auto;
      /* Clickable card contents */
      background: rgba(15, 22, 42, 0.75);
      border: 1px solid rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border-radius: 22px;
      padding: 22px;
      color: var(--text);
      box-shadow: 0 20px 45px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.1);
      animation: widgetSlideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
    }

    @keyframes widgetSlideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .widget-close-btn {
      position: absolute;
      top: 14px;
      right: 14px;
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 1.2rem;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      transition: all 0.2s;
    }

    .widget-close-btn:hover {
      color: #fff;
      background: rgba(255, 255, 255, 0.1);
    }

    .widget-title {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 14px;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      padding-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* Account balances list styling */
    .widget-account-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .widget-account-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.9rem;
    }

    .widget-account-name {
      font-weight: 500;
      color: var(--text);
    }

    .widget-account-num {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-left: 6px;
    }

    .widget-account-balance {
      font-weight: 700;
      color: #fff;
    }

    .widget-total-row {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px dashed rgba(255, 255, 255, 0.15);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 700;
      font-size: 1rem;
    }

    /* Info Grid for Profile & Advisor */
    .widget-info-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      font-size: 0.85rem;
    }

    .widget-info-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .widget-info-label {
      font-size: 0.7rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .widget-info-value {
      font-weight: 500;
      color: #fff;
    }

    .widget-info-value-full {
      grid-column: span 2;
    }

    /* Slots List */
    .widget-slots-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .widget-slot-item {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
      color: #fff;
    }

    .widget-slot-item:hover {
      background: rgba(0, 176, 255, 0.12);
      border-color: var(--primary);
      transform: translateY(-1px);
    }
  </style>
</head>

<body>

  <div class="avatar-wrapper">
    <div class="avatar-placeholder" id="placeholder">
      <div class="wave">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round" style="color: var(--primary);">
          <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z" />
          <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
          <line x1="12" x2="12" y1="19" y2="22" />
        </svg>
      </div>
      <p>Establishing secure connection...</p>
    </div>
    <video class="avatar-video" id="avatarVideo" autoplay playsinline></video>
    <div class="widget-overlay-container" id="widgetContainer"></div>
  </div>

  <!-- Left Sidebar Panel Overlay -->
  <div class="overlay-panel" id="overlayPanel">
    <div class="panel-header">
      <div class="brand-row">
        <span class="citi-logo">citi</span>
        <span class="brand-sub">Wealth Live</span>
      </div>
      <div class="status-badge">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">Disconnected</span>
      </div>
    </div>

    <div class="welcome-text">
      <h2>Conversational Assistant</h2>
      <p>Speak naturally or type below to inquire about your portfolio, market insights, and scheduling.</p>
    </div>

    <div class="chat-box" id="chatBox">
      <!-- Chat logs and real-time transcriptions appear here -->
    </div>
  </div>

  <!-- Bottom Floating Input Bar -->
  <div class="input-bar-container">
    <button class="btn-mic" id="micBtn" title="Speak to Sky">
      <svg viewBox="0 0 24 24">
        <path fill="currentColor"
          d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z" />
      </svg>
    </button>
    <input type="text" class="text-input" id="textInput" placeholder="Ask Sky anything..." autocomplete="off">
    <button class="btn" id="sendBtn">
      <span>Send</span>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        style="margin-left: 6px;">
        <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" />
      </svg>
    </button>
  </div>

  <script>
    const appName = 'live_avatar_agent';

    // Extract client name dynamically from URL search params
    const urlParams = new URLSearchParams(window.location.search);
    const userId = urlParams.get('userId') || 'web_avatar_user';
    const sessionId = 'session_' + Math.random().toString(36).substring(2, 15);

    const httpUrl = `http://localhost:8000/apps/${appName}/users/${userId}/sessions`;
    const websocketUrl = `ws://localhost:8000/run_live?user_id=${userId}&session_id=${sessionId}&app_name=${appName}&save_live_blob=true`;

    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const placeholder = document.getElementById('placeholder');
    const chatBox = document.getElementById('chatBox');
    const textInput = document.getElementById('textInput');
    const sendBtn = document.getElementById('sendBtn');
    const micBtn = document.getElementById('micBtn');
    const videoElement = document.getElementById('avatarVideo');

    let ws = null;
    let mediaSource = null;
    let sourceBuffer = null;
    let queue = [];
    let isUpdating = false;
    let hasTranscription = false;
    let isPrebuffering = true;
    const MIN_PREBUFFER_CHUNKS = 2; // Low-latency jitter buffer threshold

    async function connect() {
      statusText.textContent = 'Creating Session...';

      try {
        const response = await fetch(httpUrl, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            session_id: sessionId
          })
        });
        if (!response.ok) {
          throw new Error(`Failed to create session: ${response.statusText}`);
        }
      } catch (err) {
        console.error('Session creation failed:', err);
        addMessage('System', 'Failed to create session on the server.', 'model');
        statusText.textContent = 'Connection Error';
        return;
      }

      statusText.textContent = 'Connecting...';
      ws = new WebSocket(websocketUrl);
      ws.binaryType = 'arraybuffer';

      // Setup MediaSource for the video element
      mediaSource = new MediaSource();
      videoElement.src = URL.createObjectURL(mediaSource);

      videoElement.addEventListener('timeupdate', () => {
        if (videoElement.buffered && videoElement.buffered.length > 0) {
          const bufferedEnd = videoElement.buffered.end(videoElement.buffered.length - 1);
          const drift = bufferedEnd - videoElement.currentTime;
          if (drift > 0.6) {
            console.log('Low latency catch-up: seeking closer to live edge (drift:', drift, 's)');
            videoElement.currentTime = bufferedEnd - 0.15;
          }
        }
      });

      mediaSource.addEventListener('sourceopen', () => {
        mediaSource.duration = Infinity;
        sourceBuffer = mediaSource.addSourceBuffer('video/mp4; codecs="avc1.42E01E, mp4a.40.2"');
        sourceBuffer.addEventListener('updateend', () => {
          isUpdating = false;
          if (queue.length > 0) {
            appendNextChunk();
          }
        });
      });

      ws.onopen = () => {
        statusDot.classList.add('connected');
        statusText.textContent = 'Connected';
        placeholder.classList.add('hidden');
        addMessage('System', 'Connected securely to Sky.', 'model');
      };

      ws.onclose = () => {
        statusDot.classList.remove('connected');
        statusText.textContent = 'Disconnected';
        placeholder.classList.remove('hidden');
        addMessage('System', 'Session terminated. Reconnecting...', 'model');
        // Auto-reconnect after 3 seconds
        setTimeout(connect, 3000);
      };

      ws.onmessage = (event) => {
        try {
          const response = JSON.parse(event.data);
          console.log('WS message:', response);

          // 1. Handle user voice input transcription (inputTranscription)
          if (response.inputTranscription && response.inputTranscription.text) {
            if (!currentUserVoiceMessageDiv) {
              currentUserVoiceMessageDiv = document.createElement('div');
              currentUserVoiceMessageDiv.classList.add('chat-message', 'user');
              currentUserVoiceMessageDiv.textContent = 'Voice: ';
              chatBox.appendChild(currentUserVoiceMessageDiv);
              currentModelMessageDiv = null;
              hasTranscription = false;
            }
            if (response.inputTranscription.finished) {
              currentUserVoiceMessageDiv.textContent = 'Voice: ' + response.inputTranscription.text;
              currentUserVoiceMessageDiv = null; // Turn complete
            } else {
              currentUserVoiceMessageDiv.textContent += response.inputTranscription.text;
            }
            chatBox.scrollTop = chatBox.scrollHeight;
          }

          // 2. Handle model transcript (outputTranscription)
          if (response.outputTranscription && response.outputTranscription.text) {
            hasTranscription = true;
            if (!currentModelMessageDiv) {
              currentModelMessageDiv = document.createElement('div');
              currentModelMessageDiv.classList.add('chat-message', 'model');
              currentModelMessageDiv.textContent = '';
              chatBox.appendChild(currentModelMessageDiv);
            }
            if (response.outputTranscription.finished) {
              currentModelMessageDiv.textContent = response.outputTranscription.text;
            } else {
              currentModelMessageDiv.textContent += response.outputTranscription.text;
            }
            chatBox.scrollTop = chatBox.scrollHeight;
          }

          // 3. Handle text content (transcripts or messages)
          if (response.content && response.content.parts) {
            for (const part of response.content.parts) {
              if (part.text) {
                const cleanPart = part.text.trim().replace(/\.+$/, '');
                const cleanDiv = (currentModelMessageDiv ? currentModelMessageDiv.textContent : '').trim().replace(/\.+$/, '');
                if (cleanPart === cleanDiv) {
                  // Prevent duplication of identical speech transcript
                } else {
                  if (currentModelMessageDiv) {
                    currentModelMessageDiv.textContent = part.text;
                  } else {
                    addMessage('Sky', part.text, 'model');
                  }
                }
              }
              // 4. Handle tool response to render visual widget overlays
              if (part.functionResponse) {
                renderWidget(part.functionResponse.name, part.functionResponse.response);
              }
              // 5. Handle video inlineData chunks
              if (part.inlineData && part.inlineData.mimeType) {
                console.log('Received inlineData with mimeType:', part.inlineData.mimeType);
                if (part.inlineData.mimeType.startsWith('video/')) {
                  const base64Data = part.inlineData.data;
                  const binaryData = base64ToUint8Array(base64Data);
                  queue.push(binaryData);
                  if (!isUpdating) {
                    appendNextChunk();
                  }
                }
              }
            }
          }
        } catch (err) {
          console.error('Error parsing WebSocket message:', err);
        }
      };
    }

    let currentModelMessageDiv = null;
    let currentUserVoiceMessageDiv = null;

    const widgetContainer = document.getElementById('widgetContainer');

    function renderWidget(name, data) {
      if (!data) return;
      console.log('Rendering widget:', name, data);

      // Clear previous widget first
      widgetContainer.innerHTML = '';

      const card = document.createElement('div');
      card.classList.add('widget-card');

      // Close button
      const closeBtn = document.createElement('button');
      closeBtn.classList.add('widget-close-btn');
      closeBtn.innerHTML = '&times;';
      closeBtn.onclick = () => card.remove();

    function appendNextChunk() {
      if (isPrebuffering) {
        if (queue.length >= MIN_PREBUFFER_CHUNKS) {
          isPrebuffering = false;
          console.log('Prebuffering complete. Starting playback with', queue.length, 'chunks.');
        } else {
          console.log('Prebuffering: accumulated', queue.length, 'of', MIN_PREBUFFER_CHUNKS, 'chunks.');
          return;
        }
      }

      if (queue.length === 0) {
        isPrebuffering = true;
        return;
      }

      if (isUpdating || !sourceBuffer || sourceBuffer.updating) return;
      isUpdating = true;
      const chunk = queue.shift();
      try {
        console.log('Appending video chunk to SourceBuffer. Queue length:', queue.length);
        sourceBuffer.appendBuffer(chunk);
        if (videoElement.paused) {
          videoElement.play().catch(err => {
            console.log('Video play pending user interaction:', err);
          });
        }
      } catch (err) {
        console.error('Error appending source buffer:', err);
        addMessage('System', 'MediaSource error: ' + err.message, 'model');
        isUpdating = false;
      }
    }

    function base64ToUint8Array(base64) {
      let normalized = base64.replace(/-/g, '+').replace(/_/g, '/');
      while (normalized.length % 4 !== 0) {
        normalized += '=';
      }
      const binaryString = atob(normalized);
      const len = binaryString.length;
      const bytes = new Uint8Array(len);
      for (let i = 0; i < len; i++) {
        bytes[i] = binaryString.charCodeAt(i);
      }
      return bytes;
    }

    function addMessage(sender, text, type) {
      // Avoid duplicate consecutive system/greeting messages
      const lastMsg = chatBox.lastElementChild;
      if (lastMsg && lastMsg.textContent === text) return;

      const msgDiv = document.createElement('div');
      msgDiv.classList.add('chat-message', type);
      msgDiv.textContent = text;
      chatBox.appendChild(msgDiv);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function sendMessage() {
      const text = textInput.value.trim();
      if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;

      const request = {
        content: {
          role: 'user',
          parts: [{ text: text }]
        }
      };

      ws.send(JSON.stringify(request));
      addMessage('You', text, 'user');
      currentModelMessageDiv = null;
      textInput.value = '';

      if (videoElement.paused) {
        videoElement.play().catch(() => { });
      }
    }

    sendBtn.addEventListener('click', sendMessage);
    textInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    micBtn.addEventListener('click', toggleAudioRecording);

    let audioContext = null;
    let microphone = null;
    let processor = null;
    let isRecording = false;

    async function startAudioRecording() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioContext = new (window.AudioContext || window.webkitAudioContext)();

        const inputSampleRate = audioContext.sampleRate;
        const outputSampleRate = 16000;

        microphone = audioContext.createMediaStreamSource(stream);
        processor = audioContext.createScriptProcessor(4096, 1, 1);

        processor.onaudioprocess = (e) => {
          if (!isRecording || !ws || ws.readyState !== WebSocket.OPEN) return;

          const inputBuffer = e.inputBuffer.getChannelData(0);
          const downsampled = downsampleBuffer(inputBuffer, inputSampleRate, outputSampleRate);
          const pcm16 = floatTo16BitPCM(downsampled);
          const base64 = int16ToBase64(pcm16);

          const request = {
            blob: {
              mimeType: 'audio/pcm;rate=16000',
              data: base64
            }
          };
          ws.send(JSON.stringify(request));
        };

        microphone.connect(processor);
        processor.connect(audioContext.destination);
        isRecording = true;

        micBtn.classList.add('recording');

        if (videoElement.paused) {
          videoElement.play().catch(() => { });
        }
      } catch (err) {
        console.error('Error starting audio recording:', err);
        addMessage('System', 'Microphone error: ' + err.message, 'model');
      }
    }

    function stopAudioRecording() {
      isRecording = false;
      if (processor) {
        processor.disconnect();
        processor = null;
      }
      if (microphone) {
        microphone.disconnect();
        microphone = null;
      }
      if (audioContext) {
        audioContext.close();
        audioContext = null;
      }
      micBtn.classList.remove('recording');
    }

    function toggleAudioRecording() {
      if (isRecording) {
        stopAudioRecording();
      } else {
        startAudioRecording();
      }
    }

    function downsampleBuffer(buffer, inputSampleRate, outputSampleRate) {
      if (inputSampleRate === outputSampleRate) {
        return buffer;
      }
      const sampleRateRatio = inputSampleRate / outputSampleRate;
      const newLength = Math.round(buffer.length / sampleRateRatio);
      const result = new Float32Array(newLength);
      let offsetResult = 0;
      let offsetBuffer = 0;
      while (offsetResult < result.length) {
        const nextOffsetBuffer = Math.round((offsetResult + 1) * sampleRateRatio);
        let accum = 0;
        let count = 0;
        for (let i = offsetBuffer; i < nextOffsetBuffer && i < buffer.length; i++) {
          accum += buffer[i];
          count++;
        }
        result[offsetResult] = accum / count;
        offsetResult++;
        offsetBuffer = nextOffsetBuffer;
      }
      return result;
    }

    function floatTo16BitPCM(input) {
      const output = new Int16Array(input.length);
      for (let i = 0; i < input.length; i++) {
        const s = Math.max(-1, Math.min(1, input[i]));
        output[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
      }
      return output;
    }

    function int16ToBase64(int16Array) {
      const buffer = int16Array.buffer;
      const bytes = new Uint8Array(buffer);
      let len = bytes.byteLength;
      let binary = '';
      for (let i = 0; i < len; i++) {
        binary += String.fromCharCode(bytes[i]);
      }
      return btoa(binary);
    }



    // Start connection on load
    window.addEventListener('load', connect);
